<div class="modal-overlay" *ngIf="visible" (click)="cerrar()">
  <div class="modal-content" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h2>Nuevo Usuario</h2>
      <button class="btn-close" (click)="cerrar()">&times;</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label for="username">Usuario *</label>
        <input id="username" type="text" [(ngModel)]="username" placeholder="Ingrese el usuario">
      </div>
      <div class="form-group">
        <label for="password">Contraseña *</label>
        <input id="password" type="password" [(ngModel)]="password" placeholder="Ingrese la contraseña">
      </div>
      <div class="form-group">
        <label for="rol">Rol *</label>
        <select id="rol" [(ngModel)]="rol">
          <option value="admin">Administrador</option>
          <option value="bodeguero">Bodeguero</option>
          <option value="cajero">Cajero</option>
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" (click)="cerrar()">Cancelar</button>
      <button class="btn btn-primary" (click)="guardar()">Guardar</button>
    </div>
  </div>
</div>
